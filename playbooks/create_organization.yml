---
- name: Create ITIDAAP Organization in AAP
  hosts: localhost
  gather_facts: no
  vars:
    aap_controller_host: "https://sandbox-aap-suresh-chaurasia-dev.apps.rm3.7wse.p1.openshiftapps.com"
    aap_oauth_token: "{{ lookup('env', 'CONTROLLER_OAUTH_TOKEN') }}"
    organization_name: "ITIDAAP"

  tasks:
    - name: Create organization
      awx.awx.organization:
        name: "{{ organization_name }}"
        description: "ITIDAAP Organization"
        controller_host: "{{ aap_controller_host }}"
        controller_oauthtoken: "{{ aap_oauth_token }}"
        validate_certs: no  # Set to yes in production
      register: org_result

    - name: Debug organization creation
      debug:
        msg: "Organization '{{ organization_name }}' created with ID: {{ org_result.id }}"